<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Faultline · Voice Gateway test bench</title>
<style>
  :root{
    --bg:#0a1622; --panel:#0f2030; --panel2:#13283b; --hairline:#1d3b54;
    --ink:#dce8f2; --ink-dim:#7e98ad; --teal:#2dd4bf; --amber:#f5a623;
    --coral:#ff6b5e; --mint:#5eead4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#11293c,var(--bg));
    color:var(--ink);font:14px/1.5 ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;}
  .mono{font-family:ui-monospace,"Cascadia Code",Menlo,Consolas,monospace}
  header{padding:18px 24px;border-bottom:1px solid var(--hairline);display:flex;
    align-items:center;gap:14px}
  header h1{font-size:16px;margin:0;letter-spacing:.04em;font-weight:600}
  .pill{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--hairline);
    color:var(--ink-dim)}
  .pill.live{color:var(--mint);border-color:#1f5a4d;background:#0d2a24}
  .pill.mock{color:var(--amber);border-color:#5a4420;background:#2a2210}
  main{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:24px;max-width:1100px}
  @media(max-width:820px){main{grid-template-columns:1fr}}
  section{background:var(--panel);border:1px solid var(--hairline);border-radius:12px;padding:18px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);
    margin:0 0 14px}
  button{font:inherit;color:var(--ink);background:var(--panel2);border:1px solid var(--hairline);
    border-radius:8px;padding:9px 14px;cursor:pointer;transition:.15s}
  button:hover:not(:disabled){border-color:var(--teal)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .ptt{width:96px;height:96px;border-radius:50%;font-size:13px;display:flex;align-items:center;
    justify-content:center;text-align:center;margin:0 auto;border-width:2px}
  .ptt.rec{background:#3a1714;border-color:var(--coral);color:var(--coral);
    box-shadow:0 0 0 0 rgba(255,107,94,.5);animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,107,94,.45)}100%{box-shadow:0 0 0 22px rgba(255,107,94,0)}}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
  input,select{font:inherit;color:var(--ink);background:var(--panel2);border:1px solid var(--hairline);
    border-radius:8px;padding:8px 10px}
  input{flex:1;min-width:160px}
  .log{margin-top:14px;min-height:60px;font-size:13px}
  .transcript{margin-top:14px;max-height:260px;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .turn{padding:10px 12px;border-radius:10px;border:1px solid var(--hairline);background:var(--panel2)}
  .turn .who{font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
  .turn.agent{border-left:3px solid var(--amber)}
  .turn.agent .who{color:var(--amber)}
  .turn.supplier{border-left:3px solid var(--teal)}
  .turn.supplier .who{color:var(--teal)}
  pre{background:#08131e;border:1px solid var(--hairline);border-radius:8px;padding:12px;
    overflow:auto;font-size:12px;margin:8px 0 0}
  .speaking{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-dim);
    margin-top:12px;height:20px}
  .dot{width:10px;height:10px;border-radius:50%;background:#2a4258}
  .speaking.on{color:var(--amber)}
  .speaking.on .dot{background:var(--amber);box-shadow:0 0 12px var(--amber);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.4}}
  canvas{width:100%;height:64px;display:block;margin-top:12px;background:#08131e;
    border:1px solid var(--hairline);border-radius:8px}
  .hint{color:var(--ink-dim);font-size:12px;margin-top:8px}
  .ok{color:var(--mint)} .err{color:var(--coral)}
</style>
</head>
<body>
<header>
  <h1>FAULTLINE · Voice Gateway</h1>
  <span id="modePill" class="pill">connecting…</span>
  <span class="pill mono" id="modelPill"></span>
</header>
<main>
  <!-- ── Voice IN ─────────────────────────────────────────────── -->
  <section>
    <h2>Voice in · push-to-talk → intent</h2>
    <button id="ptt" class="ptt">HOLD<br>TO TALK</button>
    <div class="row">
      <input id="mockText" placeholder="mock transcript (used if no mic / mock mode)"
             value="approve the re-source for the cold-brew line" />
    </div>
    <div class="row">
      <select id="presetCmd">
        <option value="what's my biggest risk right now?">what's my biggest risk right now?</option>
        <option value="show the coffee chain">show the coffee chain</option>
        <option value="approve the re-source for the cold-brew line" selected>approve the re-source for the cold-brew line</option>
        <option value="reject that">reject that</option>
        <option value="what if Busan port closes for ten days">what if Busan port closes for ten days</option>
      </select>
      <button id="sendMock">send as text</button>
    </div>
    <input id="approvalId" placeholder="pending approval_id (optional)" style="margin-top:8px;width:100%"
           value="apr-resource-coldbrew-01" />
    <div class="speaking" id="ackSpeaking"><span class="dot"></span><span>idle</span></div>
    <div class="log" id="intentLog"><div class="hint">Hold the mic (or “send as text”) to get a transcript + parsed intent.</div></div>
    <pre id="intentJson" style="display:none"></pre>
  </section>

  <!-- ── Voice OUT ─────────────────────────────────────────────── -->
  <section>
    <h2>Voice out · in-app negotiation call</h2>
    <div class="row">
      <button id="callStart">▶ start call</button>
      <button id="callEnd" disabled>■ end call</button>
      <span class="hint mono" id="callStatus">—</span>
    </div>
    <div class="speaking" id="callSpeaking"><span class="dot"></span><span>nobody speaking</span></div>
    <canvas id="wave" width="500" height="64"></canvas>
    <div class="transcript" id="callTranscript"></div>
    <pre id="callSummary" style="display:none"></pre>
  </section>
</main>
<script type="module" src="/static/app.js"></script>
</body>
</html>
